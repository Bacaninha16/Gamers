<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Multiplayer</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat-container{
    width:100%;
    max-width:500px;
    height:90vh;
    background:#1e1e1e;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.header{
    background:#2a2a2a;
    padding:15px;
    text-align:center;
    font-weight:bold;
    color:white;
}

.messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.message{
    padding:10px 14px;
    border-radius:12px;
    font-size:14px;
    color:white;
    max-width:75%;
}

.sent{
    align-self:flex-end;
    background:#00a884;
}

.received{
    align-self:flex-start;
    background:#2f2f2f;
}

.username{
    font-size:12px;
    opacity:0.7;
    margin-bottom:4px;
}

.input-area{
    display:flex;
    padding:10px;
    background:#2a2a2a;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#00a884;
    color:white;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="chat-container">
    <div class="header">Chat Multiplayer</div>
    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Digite sua mensagem...">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔑 SUAS CHAVES
const firebaseConfig = {
  apiKey: "AIzaSyBLnHOe4FAYOOilvVr-SG7Tj7U4lXB71Xk",
  authDomain: "claude-44569.firebaseapp.com",
  databaseURL: "https://claude-44569-default-rtdb.firebaseio.com",
  projectId: "claude-44569",
  storageBucket: "claude-44569.firebasestorage.app",
  messagingSenderId: "828934018371",
  appId: "1:828934018371:web:5c81abac916236ebea0bf6",
  measurementId: "G-0B0WJE2M49"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db, "messages");

const username = prompt("Digite seu nome:") || "Anônimo";
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("messageInput");

window.sendMessage = function(){
    const text = input.value.trim();
    if(text === "") return;

    push(messagesRef, {
        user: username,
        text: text,
        timestamp: Date.now()
    });

    input.value = "";
}

onChildAdded(messagesRef, (data) => {
    const msg = data.val();

    const messageDiv = document.createElement("div");
    messageDiv.classList.add("message");

    if(msg.user === username){
        messageDiv.classList.add("sent");
    } else {
        messageDiv.classList.add("received");
    }

    messageDiv.innerHTML = `
        <div class="username">${msg.user}</div>
        ${msg.text}
    `;

    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

input.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>
